# ============================================================
# manifest-schema.toml
# ============================================================
# Canonical structural-explainability manifest schema definition.
# Defines required sections, fields, and validation rules for
# SE_MANIFEST.toml files in the Structural Explainability ecosystem.
#
# Navigation:
#   [meta]                schema identity
#   [manifest]            manifest file contract
#   [manifest.identity]   required top-level fields
#
#   FIELD DEFINITIONS     types and required status per field
#   CLASS REGISTRY        which sections each repo class requires
#   VALIDATION RULES      enforcement policy
#   NOTES                 non-goals and manifest role
# ============================================================


[meta]
schema = "se-manifest-schema"
version = "0.3.0"
status = "active"
title = "Structural Explainability Manifest Schema"
manifest_schema_id = "se-manifest-schema-1"
purpose = "Defines required sections, fields, and validation rules for SE_MANIFEST.toml in the Structural Explainability ecosystem."

[manifest]
filename = "SE_MANIFEST.toml"
human_legible = true
machine_readable = true
reviewable = true

[manifest.identity]
schema_field = "schema"
schema_required = true
schema_allowed = ["se-manifest-schema"]

schema_url_field = "schema_url"
schema_url_required = true

# ------------------------------------------------------------
# Section registry
# ------------------------------------------------------------

[section.meta]
required = true
description = "Non-normative contextual information about the manifest and framework."
allowed_fields = [
    "framework",
    "framework_url",
    "framework_note",
    "description",
    "purpose",
]

[section.repo]
required = true
description = "Stable repository identity and declared class."
allowed_fields = ["name", "org", "class", "kind", "status", "since", "summary"]

[section.layer]
required = true
description = "Declared epistemic position."
allowed_fields = ["space", "role"]

[section.depends]
required = true
description = "Declared upstream dependencies."
allowed_fields = ["required", "optional"]

[section.provides]
required = true
description = "Artifacts intentionally provided and maintained."
allowed_fields = ["artifacts"]

[section.contract]
required = false
description = "Formal contract metadata for repositories that define or consume a contract."
allowed_fields = [
    "contract_version",
    "exports_verified_contract",
    "consumes_contract_from",
]

[section.exports]
required = false
description = "Machine-readable artifact paths exported by the repository."
allowed_fields = [
    "invariants",
    "manifest_schema",
    "regimes",
    "relations",
    "proofs",
    "theorems",
]

[section.scope]
required = true
description = "Explicit semantic boundary."
allowed_fields = ["includes", "excludes"]

[section.validation]
required = false
description = "Repository-local validation configuration."
allowed_fields = [
    "entrypoint",
    "strict_entrypoint",
    "tag_entrypoint",
]

[section.naming]
required = false
description = "Repository naming conventions."
allowed_fields = ["pattern"]

[section.governance]
required = false
description = "Governance authority declaration."
allowed_fields = ["authority"]

[section.compatibility]
required = false
description = "Declared compatibility with constitutional and ecosystem components."
allowed_fields = [
    "constitution",
    "kernel",
    "mapspec",
    "schema",
    "profile",
    "rules",
]

[section.citation]
required = true
description = "Citation pointer metadata."
allowed_fields = ["cff", "preferred", "bib_hint"]

[section.traceability]
required = true
description = "Identifier resolution and traceability strategy."
allowed_fields = ["identifier_map"]

# ------------------------------------------------------------
# Field definitions
# ------------------------------------------------------------

[field.repo.name]
type = "string"
required = true
constraints = ["nonempty", "ascii-repo-name", "matches-constitution-naming-law"]

[field.repo.org]
type = "string"
required = true
constraints = ["nonempty"]

[field.repo.class]
type = "string"
required = true
constraints = ["known-repo-class"]

[field.repo.kind]
type = "string"
required = true
constraints = ["nonempty"]

[field.repo.status]
type = "string"
required = true
constraints = ["known-status"]

[field.repo.since]
type = "string"
required = true
constraints = ["year-or-date-string"]

[field.repo.summary]
type = "string"
required = true
constraints = ["nonempty"]

[field.layer.space]
type = "string"
required = true
constraints = ["nonempty"]

[field.layer.role]
type = "string"
required = true
constraints = ["nonempty"]

[field.depends.required]
type = "list[string]"
required = true

[field.depends.optional]
type = "list[string]"
required = true

[field.provides.artifacts]
type = "list[string]"
required = true

[field.exports.invariants]
type = "string"
required = false
constraints = ["relative-path", "json-file"]

[field.exports.manifest_schema]
type = "string"
required = false
constraints = ["relative-path", "toml-file"]

[field.exports.regimes]
type = "string"
required = false
constraints = ["relative-path", "json-file"]

[field.exports.relations]
type = "string"
required = false
constraints = ["relative-path", "json-file"]

[field.exports.proofs]
type = "string"
required = false
constraints = ["relative-path", "json-file"]

[field.exports.theorems]
type = "string"
required = false
constraints = ["relative-path", "json-file"]

# --- contract ---

[field.contract.contract_version]
type = "string"
required = false
constraints = ["nonempty"]

[field.contract.exports_verified_contract]
type = "boolean"
required = false

[field.contract.consumes_contract_from]
type = "string"
required = false
constraints = ["ascii-repo-name"]

# --- scope ---

[field.scope.includes]
type = "list[string]"
required = true

[field.scope.excludes]
type = "list[string]"
required = true

[field.validation.entrypoint]
type = "string"
required = false

[field.validation.strict_entrypoint]
type = "string"
required = false

[field.validation.tag_entrypoint]
type = "string"
required = false

[field.naming.pattern]
type = "string"
required = false

[field.governance.authority]
type = "string"
required = false

[field.meta.framework]
type = "string"
required = false

[field.meta.framework_url]
type = "string"
required = false

[field.meta.framework_note]
type = "string"
required = false

[field.meta.description]
type = "string"
required = false

[field.meta.purpose]
type = "string"
required = false

[field.compatibility.constitution]
type = "string"
required = false

[field.compatibility.kernel]
type = "string"
required = false

[field.compatibility.mapspec]
type = "string"
required = false

[field.compatibility.schema]
type = "list[string]"
required = false

[field.compatibility.profile]
type = "list[string]"
required = false

[field.compatibility.rules]
type = "list[string]"
required = false

[field.citation.cff]
type = "string"
required = true

[field.citation.preferred]
type = "string"
required = true

[field.citation.bib_hint]
type = "string"
required = false

[field.traceability.identifier_map]
type = "string"
required = true

[class_fields]
allowed_fields = [
    "required_repo_name_patterns",
    "required_layer_roles",
    "required_sections",
    "optional_sections",
    "forbidden_sections",
    "required_compatibility_fields",
]

# ------------------------------------------------------------
# Class-specific requirements
# ------------------------------------------------------------

[class.formal_contract]
required_repo_name_patterns = ["se-formal-contract"]
required_layer_roles = ["formal-contract"]
required_sections = [
    "meta",
    "repo",
    "layer",
    "depends",
    "provides",
    "exports",
    "contract",
    "scope",
    "citation",
    "traceability",
]
optional_sections = ["compatibility", "validation", "naming", "governance"]
forbidden_sections = []
required_compatibility_fields = []

[class.theory]
# upstream derivation layer; not constitution-compatible operationally
required_repo_name_patterns = ["se-theory-{focus}"]
required_layer_roles = ["theory"]
required_sections = [
    "meta",
    "repo",
    "layer",
    "depends",
    "provides",
    "scope",
    "citation",
    "traceability",
]
optional_sections = ["validation", "naming", "governance"]
forbidden_sections = [
    # WHY: Theories should not export machine-readable artifacts;
    # they export formalized knowledge, not structured data.
    "contract",
    "exports",
]
required_compatibility_fields = []

