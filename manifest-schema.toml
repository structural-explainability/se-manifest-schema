# ------------------------------------------------------------
# Validation rules
# ------------------------------------------------------------

[validation]
require_known_sections_only = true
require_known_fields_only = true
require_single_repo_class = true
require_repo_name_to_match_declared_class = true
require_declared_class_to_exist_in_class_registry = true
require_dependencies_to_follow_dependency_law = true
require_manifest_filename_exact = true

[validation.defaults]
empty_optional_lists_allowed = true
empty_required_lists_allowed = true

# ------------------------------------------------------------
# Notes
# ------------------------------------------------------------

[notes]
manifest_role = "Declares repository intent, scope, role, and compatibility under constitutional law."
non_goals = [
    "build configuration",
    "deployment configuration",
    "runtime secrets",
    "replace README documentation",
    "replace CITATION.cff",
    "duplicate constitutional law tables",
]
